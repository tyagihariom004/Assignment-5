<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
        

    </nav>
    <div class="images">
        <img src="tulip1.jpg" alt="Image 1">
        <img src="tulip2.jpg" alt="Image 2">
        <img src="tulip 3.jpg" alt="Image 3">
    </div>

    <div class="form">
        <form>
            <table>
                <caption><b>Contact Form</b></caption>
                <tr>
                    <td><label for="name">Name:</label></td>
                    <td><input type="text" id="name" name="name"></td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email"></td>
                </tr>
                <tr>
                    <td><label for="message">Message:</label></td>
                    <td><textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your message here..."></textarea></td>
                </tr>
            </table>
            <br/>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
